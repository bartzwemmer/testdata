services:
  postgresql:
    profiles:
      - postgresql
    image: postgres:18.3
    container_name: postgresql
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
    volumes:
      - postgresql_data:/var/lib/postgresql
      - ./01-pagila-schema.sql:/docker-entrypoint-initdb.d/01-pagila-schema.sql # Mount schema init script
      - ./02-pagila-data.sql:/docker-entrypoint-initdb.d/02-pagila-data.sql # Mount data init script
      - ./01-simpsons-schema.sql:/docker-entrypoint-initdb.d/01-simpsons-schema.sql # Mount schema init script
      - ./02-simpsons-data.sql:/docker-entrypoint-initdb.d/02-simpsons-data.sql # Mount data init script
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - postgresql_net

volumes:
  postgresql_data:


networks:
  postgresql_net:
    driver: bridge
