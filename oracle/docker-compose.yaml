services:
  oracle:
    profiles:
      - oracle
    image: container-registry.oracle.com/database/free:23.26.1.0-lite
    container_name: oracle
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - ORACLE_PDB=pdb1
      - ORACLE_CHARACTERSET=AL32UTF8
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./scripts:/opt/oracle/scripts
    networks:
      - oracle_net

  init-oracle:
    image: alpine:latest
    container_name: init-oracle
    profiles:
      - oracle
    depends_on:
      oracle:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/opt/oracle/scripts
    entrypoint: [ "sh", "-c", "apk add --no-cache docker-cli && docker exec oracle sqlplus -s / as sysdba @/opt/oracle/scripts/hr_install.sql helloworld \"\" YES" ]
    networks:
      - oracle_net

volumes:
  oracle_data:
  oracle_temp:


networks:
  oracle_net:
    driver: bridge
